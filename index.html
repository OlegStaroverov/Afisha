<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Афиша Севастополя</title>
  <meta name="theme-color" content="#202027" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <button id="closeBtn" class="top-icon" aria-label="Закрыть">×</button>
      <button id="backBtn" class="top-icon back hidden" aria-label="Назад">‹</button>
      <div class="title-wrap">
        <h1 id="pageTitle">Афиша Севастополя</h1>
        <span class="verified">✓</span>
      </div>
      <button class="top-icon dots" aria-label="Меню">•••</button>
    </header>

    <section id="filters" class="filters">
      <button id="dateFilter" class="filter-btn"><span>▣</span><b>Выберите дату</b></button>
      <button id="venueFilter" class="filter-btn"><span>⌖</span><b>Все площадки</b></button>
    </section>

    <main id="app" class="content"></main>

    <nav class="tabbar">
      <button class="tab active" data-tab="home" aria-label="Главная">
        <span class="ico">⌂</span><i></i>
      </button>
      <button class="tab" data-tab="favorites" aria-label="Избранное">
        <span class="ico">♡</span><i></i>
      </button>
      <button class="tab" data-tab="subscriptions" aria-label="Подписки">
        <span class="ico">♢</span><i></i>
      </button>
    </nav>
  </div>

  <div id="modal"></div>
  <script src="./app.js"></script>
</body>
</html>
